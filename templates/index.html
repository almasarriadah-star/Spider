<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Controller</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#c9d1d9; font-family:'Segoe UI',Tahoma,sans-serif; padding:10px; }

h1 { text-align:center; color:#58a6ff; margin:10px 0 5px; font-size:1.6em; }
.hw-status { text-align:center; margin-bottom:12px; font-size:0.85em; }
.hw-status .on { color:#3fb950; }
.hw-status .off { color:#f85149; }

/* Top Bar */
.top-bar { display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:15px; flex-wrap:wrap; }
.top-bar button { padding:8px 18px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.9em; }
.btn-apply-all { background:#238636; color:#fff; font-size:1em; }
.btn-apply-all:hover { background:#2ea043; }
.btn-off { background:#da3633; color:#fff; font-size:1em; animation: pulse-off 2s infinite; }
.btn-off:hover { background:#f85149; transform: scale(1.05); }
@keyframes pulse-off { 0%,100% { box-shadow: 0 0 0 0 rgba(218,54,51,0.4); } 50% { box-shadow: 0 0 8px 4px rgba(218,54,51,0.2); } }

.global-slot { display:flex; gap:0; }
.global-slot button { padding:8px 16px; border:2px solid #30363d; background:#161b22; color:#8b949e; cursor:pointer; font-weight:bold; font-size:0.95em; transition:all 0.15s; }
.global-slot button:first-child { border-radius:6px 0 0 6px; }
.global-slot button:last-child { border-radius:0 6px 6px 0; }
.global-slot button.active { background:#1f6feb; color:#fff; border-color:#58a6ff; }

/* Legs Grid */
.legs-container { display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:950px; margin:0 auto; }

.leg-card { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:12px; }
.leg-card h2 { color:#58a6ff; font-size:0.95em; margin-bottom:8px; text-align:center; border-bottom:1px solid #30363d; padding-bottom:6px; }

.servo-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.servo-label { width:75px; font-size:0.75em; color:#8b949e; text-align:left; }
.servo-val { width:30px; text-align:center; font-weight:bold; color:#f0883e; font-size:0.85em; }

input[type=range] { flex:1; height:6px; -webkit-appearance:none; background:#30363d; border-radius:3px; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; background:#58a6ff; border-radius:50%; cursor:pointer; }

.btn-sm { width:26px; height:26px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size:1em; display:flex; align-items:center; justify-content:center; }
.btn-minus { background:#da3633; color:#fff; }
.btn-minus:hover { background:#f85149; }
.btn-plus { background:#238636; color:#fff; }
.btn-plus:hover { background:#2ea043; }

/* Leg Actions */
.leg-actions { display:flex; justify-content:center; align-items:center; gap:8px; margin-top:10px; padding-top:8px; border-top:1px solid #30363d; }
.slot-group { display:flex; gap:0; }
.slot-group button { width:34px; height:30px; border:2px solid #30363d; background:#161b22; color:#8b949e; cursor:pointer; font-weight:bold; font-size:0.85em; }
.slot-group button:first-child { border-radius:5px 0 0 5px; }
.slot-group button:last-child { border-radius:0 5px 5px 0; }
.slot-group button.active { background:#1f6feb; color:#fff; border-color:#58a6ff; }
.slot-group button.has-data { color:#58a6ff; }

.btn-action { padding:5px 12px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size:0.78em; }
.btn-save { background:#8957e5; color:#fff; }
.btn-save:hover { background:#a371f7; }
.btn-restore { background:#1f6feb; color:#fff; }
.btn-restore:hover { background:#388bfd; }

/* Positions Panel */
.positions-panel { max-width:950px; margin:15px auto 0; background:#161b22; border:1px solid #30363d; border-radius:10px; padding:12px; }
.positions-panel h2 { color:#d2a8ff; font-size:1em; margin-bottom:10px; text-align:center; }
.save-row { display:flex; gap:8px; justify-content:center; margin-bottom:10px; }
.save-row input { padding:7px 12px; border-radius:6px; border:1px solid #30363d; background:#0d1117; color:#c9d1d9; font-size:0.9em; width:200px; }
.save-row button { padding:7px 16px; border:none; border-radius:6px; background:#8957e5; color:#fff; cursor:pointer; font-weight:bold; }
.save-row button:hover { background:#a371f7; }
.pos-list { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.pos-item { background:#21262d; border:1px solid #30363d; border-radius:6px; padding:6px 10px; display:flex; align-items:center; gap:6px; }
.pos-item span { color:#c9d1d9; font-size:0.85em; }
.pos-btn { border:none; border-radius:4px; padding:4px 10px; cursor:pointer; font-size:0.8em; font-weight:bold; }
.pos-load { background:#1f6feb; color:#fff; }
.pos-load:hover { background:#388bfd; }
.pos-del { background:#6e4020; color:#f0883e; }
.pos-del:hover { background:#9e6a3a; }

/* IMU Panel */
.imu-panel { max-width:950px; margin:15px auto 0; background:#161b22; border:1px solid #30363d; border-radius:10px; padding:12px; }
.imu-panel h2 { color:#79c0ff; font-size:1em; margin-bottom:10px; text-align:center; }
.imu-controls { display:flex; justify-content:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.imu-controls button { padding:6px 14px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size:0.85em; }
.btn-imu-start { background:#238636; color:#fff; }
.btn-imu-start:hover { background:#2ea043; }
.btn-imu-stop { background:#da3633; color:#fff; }
.btn-imu-stop:hover { background:#f85149; }
.btn-imu-zero { background:#1f6feb; color:#fff; }
.btn-imu-zero:hover { background:#388bfd; }

.imu-live { display:flex; justify-content:center; gap:20px; margin-bottom:10px; flex-wrap:wrap; align-items:center; }
.imu-reading { text-align:center; }
.imu-reading .label { font-size:0.75em; color:#8b949e; }
.imu-reading .value { font-size:1.3em; font-weight:bold; }

.imu-grid { display:grid; grid-template-columns:1fr 200px; gap:15px; align-items:center; }
@media(max-width:700px) { .imu-grid { grid-template-columns:1fr; } }

.chart-container { position:relative; width:100%; height:250px; background:#0d1117; border-radius:8px; border:1px solid #30363d; }
canvas#imuChart { width:100%; height:100%; }

/* 3D Tilt */
.tilt-container { display:flex; flex-direction:column; align-items:center; gap:8px; }
canvas#tiltCanvas { width:180px; height:180px; background:#0d1117; border-radius:50%; border:2px solid #30363d; }
.tilt-info { font-size:0.8em; color:#8b949e; text-align:center; }

@media(max-width:600px) {
  .legs-container { grid-template-columns:1fr; }
  .servo-label { width:60px; font-size:0.7em; }
}
</style>
</head>
<body>

<h1>🕷️ Spider Controller</h1>
<div class="hw-status" id="hwStatus">جاري التحميل...</div>

<div class="top-bar">
  <div class="global-slot" id="globalSlot">
    <button class="active" data-slot="1" onclick="setGlobalSlot(1)">1</button>
    <button data-slot="2" onclick="setGlobalSlot(2)">2</button>
    <button data-slot="3" onclick="setGlobalSlot(3)">3</button>
  </div>
  <button class="btn-apply-all" onclick="applyAllSlot()">⚡ تطبيق الكل</button>
  <button class="btn-off" onclick="applyOff()" title="إيقاف جميع المحركات وقطع التيار">⛔ إيقاف المحركات</button>
</div>

<!-- Forward Tripod Gait Controls -->
<div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:15px; justify-content:center;">
  <button onclick="startForward()"
    style="background:#0a5c2e; color:#fff; padding:9px 20px;
           border-radius:8px; border:2px solid #1a8a44;
           cursor:pointer; font-size:14px; font-weight:bold;">
    ▶️ مشي أمام
  </button>

  <button onclick="stopForward()"
    style="background:#5c0a0a; color:#fff; padding:9px 20px;
           border-radius:8px; border:2px solid #8a1a1a;
           cursor:pointer; font-size:14px; font-weight:bold;">
    ⏹️ وقف المشي
  </button>

  <select id="gait-speed"
    style="padding:7px 10px; border-radius:6px;
           background:#1e1e1e; color:#eee; border:1px solid #444;
           font-size:14px;">
    <option value="0.5">🐢 بطيء (0.5×)</option>
    <option value="1.0" selected>🚶 عادي (1.0×)</option>
    <option value="1.5">🏃 سريع (1.5×)</option>
    <option value="2.0">⚡ أقصى (2.0×)</option>
  </select>

  <span id="gait-status"
    style="color:#888; font-size:13px; min-width:180px;">
    ⬛️ واقف
  </span>
</div>

<div class="legs-container" id="legsContainer"></div>

<div class="positions-panel">
  <h2>💾 حفظ واسترجاع الوضعيات</h2>
  <div class="save-row">
    <input type="text" id="posName" placeholder="اسم الوضعية...">
    <button onclick="savePosition()">💾 حفظ</button>
  </div>
  <div class="pos-list" id="posList">لا توجد وضعيات محفوظة</div>
</div>

<div class="imu-panel">
  <h2>🧭 حساس الميلان (BNO085)</h2>
  <div class="imu-controls">
    <button class="btn-imu-start" id="btnImuStart" onclick="startIMU()">▶ تشغيل</button>
    <button class="btn-imu-stop" id="btnImuStop" onclick="stopIMU()" style="display:none">⏹ إيقاف</button>
    <button class="btn-imu-zero" onclick="zeroIMU()">🎯 تصفير</button>
  </div>
  <div class="imu-live" id="imuLive" style="display:none">
    <div class="imu-reading"><div class="label">Roll</div><div class="value" id="imuRoll" style="color:#3fb950">0.00°</div></div>
    <div class="imu-reading"><div class="label">Pitch</div><div class="value" id="imuPitch" style="color:#58a6ff">0.00°</div></div>
    <div class="imu-reading"><div class="label">Yaw</div><div class="value" id="imuYaw" style="color:#d2a8ff">0.00°</div></div>
  </div>
  <div class="imu-grid">
    <div class="chart-container"><canvas id="imuChart"></canvas></div>
    <div class="tilt-container">
      <canvas id="tiltCanvas" width="180" height="180"></canvas>
      <div class="tilt-info" id="tiltInfo">مستوى</div>
    </div>
  </div>
</div>

<script>
// ── Config ──
const LEG_GROUPS = {
  "Right Front (RF)": ["R0","R1","R2"],
  "Right Middle (RM)": ["R3","R4","R5"],
  "Right Rear (RR)":   ["R6","R7","R8"],
  "Left Front (LF)":   ["L0","L1","L2"],
  "Left Middle (LM)":  ["L3","L4","L5"],
  "Left Rear (LR)":    ["L6","L7","L8"]
};
const GROUP_KEYS = {"Right Front (RF)":"RF","Right Middle (RM)":"RM","Right Rear (RR)":"RR",
                    "Left Front (LF)":"LF","Left Middle (LM)":"LM","Left Rear (LR)":"LR"};
const JOINT_NAMES = {0:"Coxa",1:"Femur",2:"Tibia"};

let servos = {};
let legPresets = {};
let activeSlot = 1;
let globalSlot = 1;
let minA = 45, maxA = 135;

async function api(url, data) {
  const r = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body: data ? JSON.stringify(data) : undefined });
  return r.json();
}

// ── Load ──
async function loadStatus() {
  const d = await (await fetch("/api/status")).json();
  servos = d.servos; minA = d.min; maxA = d.max;
  document.getElementById("hwStatus").innerHTML = d.hardware
    ? '<span class="on">🟢 الهاردوير متصل</span>'
    : '<span class="off">🔴 وضع المحاكاة</span>';
  buildUI();
}

async function loadPresets() {
  const d = await (await fetch("/api/leg/presets")).json();
  legPresets = d.presets;
  updateSlotButtons();
}

function updateSlotButtons() {
  document.querySelectorAll(".slot-group").forEach(sg => {
    const group = sg.dataset.group;
    sg.querySelectorAll("button").forEach(btn => {
      const slot = btn.dataset.slot;
      btn.classList.toggle("has-data", !!(legPresets[group] && legPresets[group][slot]));
    });
  });
}

// ── Build UI ──
function buildUI() {
  const c = document.getElementById("legsContainer");
  c.innerHTML = "";
  for (const [legName, keys] of Object.entries(LEG_GROUPS)) {
    const gk = GROUP_KEYS[legName];
    const card = document.createElement("div");
    card.className = "leg-card";
    card.innerHTML = `<h2>${legName}</h2>`;
    keys.forEach(key => {
      const s = servos[key];
      const ji = keys.indexOf(key) % 3;
      const row = document.createElement("div");
      row.className = "servo-row";
      row.innerHTML = `
        <span class="servo-label">${key} (${JOINT_NAMES[ji]})</span>
        <button class="btn-sm btn-minus" onclick="step('${key}',-1)">−</button>
        <input type="range" id="sl_${key}" min="${minA}" max="${maxA}" value="${s.angle}" oninput="slide('${key}',this.value)">
        <button class="btn-sm btn-plus" onclick="step('${key}',1)">+</button>
        <span class="servo-val" id="val_${key}">${s.angle}°</span>
      `;
      card.appendChild(row);
    });

    const actions = document.createElement("div");
    actions.className = "leg-actions";
    actions.innerHTML = `
      <div class="slot-group" data-group="${gk}">
        <button data-slot="1" class="has-data active" onclick="selectSlot('${gk}',1)">1</button>
        <button data-slot="2" onclick="selectSlot('${gk}',2)">2</button>
        <button data-slot="3" onclick="selectSlot('${gk}',3)">3</button>
      </div>
      <button class="btn-action btn-save" onclick="saveSlot('${gk}')">💾 حفظ</button>
      <button class="btn-action btn-restore" onclick="restoreSlot('${gk}')">📥 استعادة</button>
    `;
    card.appendChild(actions);
    c.appendChild(card);
  }
  updateSlotButtons();
}

// ── Servo Controls ──
function updateSlider(key) {
  const sl = document.getElementById("sl_" + key);
  const vl = document.getElementById("val_" + key);
  if (sl) sl.value = servos[key].angle;
  if (vl) vl.textContent = servos[key].angle + "°";
}

async function slide(key, val) {
  const a = parseInt(val);
  servos[key].angle = a;
  document.getElementById("val_" + key).textContent = a + "°";
  await api("/api/servo", {key, angle: a});
}

async function step(key, dir) {
  const a = Math.max(minA, Math.min(maxA, servos[key].angle + dir));
  servos[key].angle = a;
  updateSlider(key);
  await api("/api/servo", {key, angle: a});
}

async function applyOff() { await api("/api/off"); await loadStatus(); }

// ── Slot Controls ──
function selectSlot(group, slot) {
  const sg = document.querySelector(`.slot-group[data-group="${group}"]`);
  sg.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  sg.querySelector(`button[data-slot="${slot}"]`).classList.add("active");
}

function getSelectedSlot(group) {
  const active = document.querySelector(`.slot-group[data-group="${group}"] button.active`);
  return active ? parseInt(active.dataset.slot) : 1;
}

async function saveSlot(group) {
  const slot = getSelectedSlot(group);
  await api("/api/leg/preset/save", {group, slot});
  await loadPresets();
}

async function restoreSlot(group) {
  const slot = getSelectedSlot(group);
  await api("/api/leg/preset/load", {group, slot});
  await loadStatus();
}

// ── Global Slot ──
function setGlobalSlot(slot) {
  globalSlot = slot;
  document.querySelectorAll("#globalSlot button").forEach(b => b.classList.toggle("active", parseInt(b.dataset.slot) === slot));
}

async function applyAllSlot() {
  for (const gk of Object.values(GROUP_KEYS)) {
    await api("/api/leg/preset/load", {group: gk, slot: globalSlot});
  }
  await loadStatus();
}

// ── Positions ──
async function loadPositions() {
  const d = await (await fetch("/api/positions")).json();
  renderPositions(d.positions);
}

function renderPositions(positions) {
  const c = document.getElementById("posList");
  const keys = Object.keys(positions);
  if (!keys.length) { c.innerHTML = "لا توجد وضعيات محفوظة"; return; }
  c.innerHTML = "";
  keys.forEach(name => {
    const item = document.createElement("div");
    item.className = "pos-item";
    item.innerHTML = `<span>${name}</span>
      <button class="pos-btn pos-load" onclick="loadPos('${name}')">تحميل</button>
      <button class="pos-btn pos-del" onclick="delPos('${name}')">حذف</button>`;
    c.appendChild(item);
  });
}

async function savePosition() {
  const name = document.getElementById("posName").value.trim();
  if (!name) { alert("أدخل اسم الوضعية"); return; }
  await api("/api/positions/save", {name});
  document.getElementById("posName").value = "";
  await loadPositions();
}
async function loadPos(name) { await api("/api/positions/load", {name}); await loadStatus(); }
async function delPos(name) { if (!confirm(`حذف "${name}"؟`)) return; await api("/api/positions/delete", {name}); await loadPositions(); }

// ── IMU ──
let imuRunning = false, imuInterval = null;
const MAX_POINTS = 60;
const imuData = {roll:[], pitch:[], yaw:[]}, imuTimes = [];

function initCanvases() {
  resizeChart();
  window.addEventListener("resize", resizeChart);
  drawChart();
  drawTilt(0, 0);
}

function resizeChart() {
  const canvas = document.getElementById("imuChart");
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
}

function drawChart() {
  const canvas = document.getElementById("imuChart");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const pad = {top:25, bottom:30, left:50, right:15};
  const gW = W - pad.left - pad.right, gH = H - pad.top - pad.bottom;

  ctx.fillStyle = "#0d1117"; ctx.fillRect(0,0,W,H);

  ctx.strokeStyle = "#21262d"; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (gH/4)*i;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
  }

  let allV = [...imuData.roll,...imuData.pitch,...imuData.yaw];
  let minV = allV.length ? Math.min(...allV) : -5, maxV = allV.length ? Math.max(...allV) : 5;
  let range = maxV - minV; if (range < 2) range = 2;
  minV -= range*0.15; maxV += range*0.15; range = maxV - minV;

  ctx.fillStyle = "#8b949e"; ctx.font = "10px sans-serif"; ctx.textAlign = "right";
  for (let i = 0; i <= 4; i++) {
    const v = maxV - (range/4)*i, y = pad.top + (gH/4)*i;
    ctx.fillText(v.toFixed(1)+"°", pad.left-5, y+3);
  }

  if (minV <= 0 && maxV >= 0) {
    const zy = pad.top + ((maxV-0)/range)*gH;
    ctx.strokeStyle = "#30363d"; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(pad.left,zy); ctx.lineTo(W-pad.right,zy); ctx.stroke();
    ctx.setLineDash([]);
  }

  if (imuTimes.length < 2) return;
  const n = imuTimes.length;

  function drawL(data, color) {
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const x = pad.left + (i/(MAX_POINTS-1))*gW;
      const y = pad.top + ((maxV - data[i])/range)*gH;
      i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  drawL(imuData.roll, "#3fb950");
  drawL(imuData.pitch, "#58a6ff");
  drawL(imuData.yaw, "#d2a8ff");

  ctx.font = "bold 11px sans-serif"; ctx.textAlign = "left";
  [{l:"Roll",c:"#3fb950",x:pad.left+5},{l:"Pitch",c:"#58a6ff",x:pad.left+65},{l:"Yaw",c:"#d2a8ff",x:pad.left+125}].forEach(l => {
    ctx.fillStyle = l.c; ctx.fillRect(l.x,5,12,12);
    ctx.fillStyle = "#c9d1d9"; ctx.fillText(l.l, l.x+16, 15);
  });
}

function drawTilt(roll, pitch) {
  const canvas = document.getElementById("tiltCanvas");
  const ctx = canvas.getContext("2d");
  const cx = 90, cy = 90, r = 75;

  ctx.clearRect(0,0,180,180);

  // Outer ring
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle = "#30363d"; ctx.lineWidth = 2; ctx.stroke();

  // Cross
  ctx.strokeStyle = "#21262d"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx-r,cy); ctx.lineTo(cx+r,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx,cy+r); ctx.stroke();

  // Concentric circles
  [0.33, 0.66].forEach(f => {
    ctx.beginPath(); ctx.arc(cx,cy,r*f,0,Math.PI*2);
    ctx.strokeStyle = "#21262d"; ctx.stroke();
  });

  // Tilt indicator (dot position based on roll/pitch)
  const maxAngle = 30;
  const nx = Math.max(-1, Math.min(1, roll / maxAngle));
  const ny = Math.max(-1, Math.min(1, -pitch / maxAngle));
  const dx = cx + nx * r * 0.85;
  const dy = cy + ny * r * 0.85;

  // Line from center to dot
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(dx,dy);
  ctx.strokeStyle = "#f0883e"; ctx.lineWidth = 2; ctx.stroke();

  // Dot
  ctx.beginPath(); ctx.arc(dx,dy,8,0,Math.PI*2);
  ctx.fillStyle = "#f0883e"; ctx.fill();
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 1; ctx.stroke();

  // Center dot
  ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2);
  ctx.fillStyle = "#8b949e"; ctx.fill();

  // Update text
  const totalTilt = Math.sqrt(roll*roll + pitch*pitch);
  const info = document.getElementById("tiltInfo");
  if (totalTilt < 1) info.textContent = "✅ مستوى";
  else if (totalTilt < 5) info.textContent = "⚠️ ميلان خفيف " + totalTilt.toFixed(1) + "°";
  else info.textContent = "🔴 ميلان " + totalTilt.toFixed(1) + "°";
}

function addIMUPoint(roll, pitch, yaw) {
  imuData.roll.push(roll); imuData.pitch.push(pitch); imuData.yaw.push(yaw);
  imuTimes.push(Date.now());
  if (imuData.roll.length > MAX_POINTS) {
    imuData.roll.shift(); imuData.pitch.shift(); imuData.yaw.shift(); imuTimes.shift();
  }
  document.getElementById("imuRoll").textContent = roll.toFixed(2) + "°";
  document.getElementById("imuPitch").textContent = pitch.toFixed(2) + "°";
  document.getElementById("imuYaw").textContent = yaw.toFixed(2) + "°";
  drawChart();
  drawTilt(roll, pitch);
}

async function pollIMU() {
  if (!imuRunning) return;
  try {
    const d = await (await fetch("/api/imu/read")).json();
    if (d.ok) addIMUPoint(d.roll, d.pitch, d.yaw);
  } catch(e) {}
  if (imuRunning) imuInterval = setTimeout(pollIMU, 200);
}

async function startIMU() {
  const d = await (await fetch("/api/imu/status")).json();
  if (!d.ready) { alert("حساس BNO085 غير متصل!"); return; }
  imuRunning = true;
  imuData.roll=[]; imuData.pitch=[]; imuData.yaw=[]; imuTimes=[];
  document.getElementById("btnImuStart").style.display = "none";
  document.getElementById("btnImuStop").style.display = "";
  document.getElementById("imuLive").style.display = "";
  pollIMU();
}

function stopIMU() {
  imuRunning = false;
  if (imuInterval) { clearTimeout(imuInterval); imuInterval = null; }
  document.getElementById("btnImuStart").style.display = "";
  document.getElementById("btnImuStop").style.display = "none";
}

async function zeroIMU() {
  const r = await api("/api/imu/zero");
  if (r.ok) alert("تم التصفير!");
  else alert("فشل: " + (r.error||""));
}

// ── Forward Gait Controls ──
let _gaitPoll = null;

async function startForward() {
  const speed = parseFloat(document.getElementById('gait-speed').value);
  const r = await fetch('/api/gait/forward/start', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({speed: speed, cycles: 0})
  });
  const d = await r.json();
  if (d.ok) {
    document.getElementById('gait-status').textContent = '🟢 يمشي...';
    _gaitPoll = setInterval(pollGaitStatus, 600);
  } else {
    document.getElementById('gait-status').textContent = '🔴 ' + d.error;
  }
}

async function stopForward() {
  await fetch('/api/gait/forward/stop', {method: 'POST'});
  document.getElementById('gait-status').textContent = '🟡 يوقف...';
}

async function pollGaitStatus() {
  try {
    const r = await fetch('/api/gait/forward/status');
    const d = await r.json();
    const el = document.getElementById('gait-status');
    if (d.running) {
      el.textContent = '🟢 ' + d.current_phase + ' | دورة #' + d.step_count;
    } else {
      el.textContent = '⬛️ واقف';
      if (_gaitPoll) { clearInterval(_gaitPoll); _gaitPoll = null; }
    }
  } catch(e) {}
}

// ── Init ──
loadStatus();
loadPositions();
loadPresets();
initCanvases();
</script>
